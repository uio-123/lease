<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,user-scalable=no"
    />
    <link rel="icon" href="/qingyu-icon.svg" type="image/svg+xml" />
    <title>青寓</title>
  </head>
  <body>
    <div id="app">
      <style>
        html,
        body,
        #app {
          height: 100%;
          margin: 0px;
          padding: 0px;
          width: 100%;
        }
        .__spinner-container {
          height: 100%;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
        }
        .__spinner {
          position: relative;
          width: 72px;
          height: 72px;
          border-radius: 24px;
          background: #f0fdfa;
          box-shadow: 0 18px 46px rgba(15, 118, 110, 0.18);
          overflow: hidden;
          animation: qingyu-spinner 1.6s ease-in-out infinite;
        }
        .__spinner::before {
          content: '';
          position: absolute;
          left: 15px;
          top: 19px;
          width: 42px;
          height: 36px;
          border: 8px solid #0f766e;
          border-top: 0;
          border-radius: 0 0 10px 10px;
        }
        .__spinner::after {
          content: '';
          position: absolute;
          left: 17px;
          top: 15px;
          width: 38px;
          height: 38px;
          border-left: 8px solid #0f766e;
          border-top: 8px solid #0f766e;
          transform: rotate(45deg);
          border-radius: 6px 0 0 0;
        }
        .__spinner-text {
          margin-top: 18px;
          color: #0f766e;
          font-size: 15px;
          font-weight: 700;
          letter-spacing: 0;
        }
        @keyframes qingyu-spinner {
          50% {
            transform: translateY(-4px);
          }
          100% {
            transform: translateY(0);
          }
        }
      </style>
      <div class="__spinner-container">
        <div class="__spinner"></div>
        <div class="__spinner-text">青寓</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <% if (ENABLE_ERUDA === "true") { %>
    <script src="//cdn.jsdelivr.net/npm/eruda"></script>
    <script>
      eruda.init();
    </script>
    <% } %>
    <script>
      window.onload = function () {
        document.addEventListener('touchstart', function (event) {
          if (event.touches.length > 1) {
            event.preventDefault();
          }
        });

        var lastTouchEnd = 0;

        document.addEventListener(
          'touchend',
          function (event) {
            var now = new Date().getTime();
            if (now - lastTouchEnd <= 300) {
              event.preventDefault();
            }

            lastTouchEnd = now;
          },
          false,
        );

        document.addEventListener('gesturestart', function (event) {
          event.preventDefault();
        });
      };
    </script>
  </body>
</html>
